<!DOCTYPE html>
<html>

<head>
    <title>Parking Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Parking Management System</h1>

<h2>Free spots: {{free}}</h2>

<form action="/add" method="POST">
    <input type="text" name="plate" placeholder="Car Plate Number" required>
    <button type="submit">Add Car</button>
</form>

<h2>Cars in Parking</h2>

<table>

<tr>
<th>ID</th>
<th>Plate</th>
<th>Entry Time</th>
<th>Action</th>
</tr>

{% for car in cars %}

<tr>
<td>{{car[0]}}</td>
<td>{{car[1]}}</td>
<td>{{car[2]}}</td>
<td>
<a href="/exit/{{car[0]}}">Exit</a>
</td>
</tr>

{% endfor %}

</table>

</body>
</html>
